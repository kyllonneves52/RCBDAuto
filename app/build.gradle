kplugins {
    id 'com.android.application'
}

android {
    namespace 'com.rcbd.auto'
    compileSdk 31

    defaultConfig {
        applicationId "com.rcbd.auto"
        minSdk 23
        targetSdk 31
        versionCode 1
        versionName "1.0"
    }
    
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
