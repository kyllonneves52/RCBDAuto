plugins {
    id 'com.android.application'
}

android {
    namespace 'com.rcbd.auto'
    compileSdk 35

    defaultConfig {
        applicationId "com.rcbd.auto"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core:1.12.0'
}